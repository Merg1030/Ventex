<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Trismart Stores</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --blue:   #4361ee;
            --cyan:   #00b4d8;
            --green:  #10b981;
            --danger: #ef4444;
            --bg:     #f4f6fb;
            --bg2:    #ffffff;
            --bg3:    #f1f3f5;
            --border: #e2e6ef;
            --text:   #1a1e2e;
            --fade:   #6b7490;
            --dim:    #a0a8c0;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100vh; width: 100%;
            font-family: 'DM Sans', sans-serif;
            color: var(--text); overflow-x: hidden;
        }

        body {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
            background: var(--bg);
            background-image:
                linear-gradient(rgba(67,97,238,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(67,97,238,0.04) 1px, transparent 1px);
            background-size: 36px 36px;
        }

        body::before {
            content: ''; position: fixed; top: -120px; right: -120px;
            width: 420px; height: 420px; border-radius: 50%;
            background: radial-gradient(circle, rgba(67,97,238,0.12), transparent 70%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; bottom: -100px; left: -80px;
            width: 340px; height: 340px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,180,216,0.09), transparent 70%);
            pointer-events: none; z-index: 0;
        }

        .card {
            position: relative; z-index: 1;
            background: var(--bg2); border-radius: 24px;
            box-shadow: 0 8px 40px rgba(67,97,238,0.12), 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            width: 100%; max-width: 380px;
            padding: 36px 32px 28px;
            animation: popUp 0.5s cubic-bezier(0.22,1,0.36,1) backwards;
        }

        .brand {
            display: flex; flex-direction: column;
            align-items: center; gap: 8px; margin-bottom: 26px;
        }
        .logo-wrap {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.5rem;
            box-shadow: 0 6px 20px rgba(67,97,238,0.3);
        }
        .brand-name { font-size: 1.5rem; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
        .brand-name span { color: var(--blue); }
        .brand-sub { font-size: 0.68rem; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.14em; }

        .divider { height: 1px; background: var(--border); margin: 0 0 22px; }

        .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .field label { font-size: 0.65rem; font-weight: 800; color: var(--fade); text-transform: uppercase; letter-spacing: 0.1em; }

        .input-wrap { position: relative; }
        .input-wrap .ico {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: var(--dim); font-size: 0.85rem; pointer-events: none;
        }
        .input-wrap input {
            width: 100%; padding: 11px 12px 11px 36px;
            border: 1.5px solid var(--border); border-radius: 10px;
            background: var(--bg3); color: var(--text);
            font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
            outline: none; transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
        }
        .input-wrap input:focus {
            border-color: var(--blue); background: white;
            box-shadow: 0 0 0 3px rgba(67,97,238,0.12);
        }
        .input-wrap input::placeholder { color: var(--dim); }

        .pw-toggle {
            position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
            color: var(--dim); cursor: pointer; font-size: 0.85rem;
            background: none; border: none; padding: 4px; transition: color 0.15s;
        }
        .pw-toggle:hover { color: var(--blue); }

        .login-btn {
            width: 100%; margin-top: 8px; padding: 13px;
            border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            color: white; font-weight: 800; font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif; cursor: pointer;
            box-shadow: 0 4px 16px rgba(67,97,238,0.28);
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .login-btn:hover   { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(67,97,238,0.35); }
        .login-btn:active  { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

        .error-box {
            display: none; align-items: center; gap: 8px;
            background: rgba(239,68,68,0.07);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 10px; padding: 9px 12px; margin-top: 12px;
            font-size: 0.78rem; font-weight: 700; color: var(--danger);
        }
        .error-box.show { display: flex; animation: shake 0.35s ease; }
        .error-box i { font-size: 0.88rem; flex-shrink: 0; }

        .card-foot { margin-top: 20px; text-align: center; font-size: 0.62rem; color: var(--dim); font-weight: 600; letter-spacing: 0.06em; }

        @keyframes popUp {
            from { opacity: 0; transform: translateY(22px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-6px); }
            40%     { transform: translateX(6px); }
            60%     { transform: translateX(-4px); }
            80%     { transform: translateX(4px); }
        }

        @media (max-width: 420px) {
            .card { padding: 26px 18px 20px; border-radius: 20px; }
            .brand-name { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="card">

    <div class="brand">
        <div class="logo-wrap"><i class="fas fa-store-alt"></i></div>
        <div class="brand-name">Tri<span>smart</span></div>
        <div class="brand-sub">Store Management System</div>
    </div>

    <div class="divider"></div>

    <form id="loginForm" autocomplete="off">

        <div class="field">
            <label>Username</label>
            <div class="input-wrap">
                <i class="fas fa-user ico"></i>
                <input type="text" id="username" placeholder="Enter your username" maxlength="30" required autofocus>
            </div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <i class="fas fa-lock ico"></i>
                <input type="password" id="password" placeholder="Enter your password" maxlength="30" required>
                <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1">
                    <i class="fas fa-eye" id="pwIcon"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>

        <div class="error-box" id="errorBox">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Invalid username or password</span>
        </div>
    </form>

    <div class="card-foot">© 2025 Trismart Stores · All rights reserved</div>
</div>

<script>
    /* ── ALWAYS clear session when landing on login ── */
    localStorage.removeItem('userName');
    localStorage.removeItem('branchId');

    /* ── Block browser back button ── */
    history.pushState(null, '', window.location.href);
    window.addEventListener('popstate', () => {
        history.pushState(null, '', window.location.href);
    });

    /* ── Users ── */
    const USERS = [
        { username: 'Mirriam', password: 'Mirriam@12345', branch: 'makeni' },
        { username: 'Magret',  password: 'Magret.',        branch: 'kabana' },
        { username: 'Chris',   password: 'chishela10',     branch: 'master' }
    ];

    /* ── Password toggle ── */
    const pwInput  = document.getElementById('password');
    const pwToggle = document.getElementById('pwToggle');
    const pwIcon   = document.getElementById('pwIcon');
    pwToggle.addEventListener('click', () => {
        const show = pwInput.type === 'password';
        pwInput.type     = show ? 'text' : 'password';
        pwIcon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    /* ── Login ── */
    const loginForm = document.getElementById('loginForm');
    const loginBtn  = document.getElementById('loginBtn');
    const errorBox  = document.getElementById('errorBox');
    const errorText = document.getElementById('errorText');

    function showError(msg) {
        errorText.textContent = msg;
        errorBox.classList.remove('show');
        void errorBox.offsetWidth; // force reflow to restart animation
        errorBox.classList.add('show');
        pwInput.style.borderColor = 'var(--danger)';
        setTimeout(() => { pwInput.style.borderColor = ''; }, 1400);
    }

    loginForm.addEventListener('submit', e => {
        e.preventDefault();
        errorBox.classList.remove('show');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            showError('Please enter your username and password.');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

        setTimeout(() => {
            const user = USERS.find(u =>
                u.username.toLowerCase() === username.toLowerCase() &&
                u.password === password
            );

            if (user) {
                localStorage.setItem('userName', user.username.toLowerCase());
                localStorage.setItem('branchId', user.branch);

                loginBtn.innerHTML = '<i class="fas fa-check"></i> Welcome!';

                /* use replace() so back button on dashboard can't return to login */
                setTimeout(() => {
                    window.location.replace('dashboard.html');
                }, 500);
            } else {
                showError('Wrong username or password. Try again.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }, 600);
    });
</script>
</body>
</html>
