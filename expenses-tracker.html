<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trismart · Expenses Ledger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #16161f;
      --border: #1e1e2a; --border2: #2a2a3a;
      --accent: #6366f1; --accent2: #818cf8;
      --text: #f0f0f8; --muted: #6b7280; --muted2: #4b5563;
      --green: #10b981; --red: #ef4444;
      --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
    *::-webkit-scrollbar { width: 5px; height: 5px; }
    *::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 20px; }
    .back-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border2); background: transparent; color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; font-size: 0.85rem; transition: all 0.18s; }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-title { font-family: 'Syne', sans-serif; font-size: 1.35rem; font-weight: 800; color: var(--text); letter-spacing: -0.01em; }
    .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .month-pick { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 14px; font-size: 0.84rem; color: var(--muted); }
    .month-pick input[type="month"] { background: transparent; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 600; color: var(--text); outline: none; cursor: pointer; }
    .month-pick input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.18s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-ghost { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .main { flex: 1; padding: 28px 32px; display: flex; flex-direction: column; gap: 0; }

    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; flex: 1; display: flex; flex-direction: column; }
    .table-scroll { overflow-x: auto; flex: 1; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead { position: sticky; top: 0; z-index: 10; }
    th { background: var(--surface2); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); padding: 13px 18px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th:nth-child(4), td:nth-child(4) { text-align: right; }
    th:nth-child(5), td:nth-child(5) { text-align: right; }
    th:last-child, td:last-child { text-align: center; width: 60px; }
    td { padding: 14px 18px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.12s; }
    tbody tr:hover { background: var(--surface2); }
    .empty-row td { text-align: center; padding: 64px; color: var(--muted); font-size: 0.9rem; }

    .amount-neutral { color: var(--text); font-weight: 500; font-family: 'DM Sans', sans-serif; }
    .amount-bal { color: var(--text); font-weight: 600; font-family: 'Syne', sans-serif; }

    /* Action Menu */
    .action-btn {
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; padding: 8px; border-radius: 6px;
      transition: all 0.18s; font-size: 1rem;
    }
    .action-btn:hover { background: var(--border2); color: var(--text); }
    .menu-container {
      position: relative; display: inline-block;
    }
    .dropdown-menu {
      position: absolute; right: 0; top: 100%; z-index: 1000;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; padding: 6px; min-width: 120px;
      box-shadow: var(--shadow); display: none;
    }
    .dropdown-menu.show { display: block; }
    .menu-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      color: var(--text); text-decoration: none; font-size: 0.85rem;
      border-radius: 6px; transition: all 0.18s; cursor: pointer;
      border: none; background: transparent; width: 100%; text-align: left;
    }
    .menu-item:hover { background: var(--border2); }
    .menu-item.delete:hover { color: var(--red); }
    .menu-item i { width: 16px; font-size: 0.85rem; }

    /* Modal */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); z-index: 900; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 32px; width: 90%; max-width: 440px; box-shadow: var(--shadow); animation: slideUp 0.22s ease; max-height: 92vh; overflow-y: auto; }
    @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-head h2 { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 800; }
    .close-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; transition: all 0.18s; }
    .close-btn:hover { background: var(--border2); color: var(--text); }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .field input { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.18s; }
    .field input::placeholder { color: var(--muted2); }
    .field input:focus { border-color: var(--accent); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-error { color: #f87171; font-size: 0.8rem; margin-bottom: 12px; min-height: 16px; }
    .save-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; }
    .save-btn:hover { background: var(--accent2); }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .delete-btn { background: var(--red); width: 100%; padding: 13px; border: none; border-radius: 8px; color: white; font-weight: 700; cursor: pointer; transition: opacity 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .delete-btn:hover { opacity: 0.8; }

    .toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 10px; padding: 12px 18px; font-size: 0.87rem; font-weight: 600; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); animation: toastIn 0.22s ease; }
    .toast i { font-size: 1rem; }
    .toast.success { border-left: 4px solid var(--green); }
    .toast.success i { color: var(--green); }
    .toast.error { border-left: 4px solid var(--red); }
    .toast.error i { color: var(--red); }
    .toast.info { border-left: 4px solid var(--accent); }
    .toast.info i { color: var(--accent); }
    @keyframes toastIn { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="cashbook.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <span class="page-title">EXPENSES ACCOUNT</span>
  </div>
  <div class="topbar-right">
    <div class="month-pick">
      <i class="fas fa-calendar-alt" style="font-size:0.75rem"></i>
      <input type="month" id="monthPicker">
    </div>
    <button class="btn btn-ghost" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
    <button class="btn btn-primary" onclick="openModal('add')"><i class="fas fa-plus"></i> Add Transaction</button>
  </div>
</div>

<div class="main">
  <div class="table-card">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Reference</th>
            <th>Amount</th>
            <th>Balance</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="txnTbody">
          <tr class="empty-row"><td colspan="6"><i class="fas fa-spinner fa-spin"></i> Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- Add/Edit Transaction Modal -->
<div class="overlay" id="overlay" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Add Transaction</h2>
      <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="form-error" id="formErr"></div>
    <form onsubmit="saveTxn(event)" autocomplete="off">
      <input type="hidden" id="fId">
      <div class="field">
        <label>Date</label>
        <input type="date" id="fDate" required>
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="fDesc" placeholder="e.g. Office supplies" required>
      </div>
      <div class="field">
        <label>Reference</label>
        <input type="text" id="fRef" placeholder="e.g. RCP-042">
      </div>
      <div class="field">
        <label>Amount</label>
        <input type="number" id="fAmount" min="0.01" step="0.01" placeholder="0.00" required>
      </div>
      <button type="submit" class="save-btn" id="saveBtn">
        <i class="fas fa-check"></i> Save Transaction
      </button>
    </form>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="overlay" id="deleteOverlay" onclick="if(event.target===this) closeDeleteModal()">
  <div class="modal" style="max-width: 380px;">
    <div class="modal-head">
      <h2>Delete Transaction</h2>
      <button class="close-btn" onclick="closeDeleteModal()"><i class="fas fa-times"></i></button>
    </div>
    <p style="margin: 20px 0; color: var(--muted);">Are you sure you want to delete this transaction? This action cannot be undone.</p>
    <input type="hidden" id="deleteId">
    <button class="delete-btn" onclick="confirmDelete()">
      <i class="fas fa-trash"></i> Delete Permanently
    </button>
  </div>
</div>

<script>
  // ==================== FIREBASE INIT ====================
  firebase.initializeApp({
    apiKey: "AIzaSyB-lm7Y3r1F6Vv8PKvY8glLabZDbJsHM1k",
    authDomain: "trismartstores.firebaseapp.com",
    projectId: "trismartstores",
    storageBucket: "trismartstores.firebasestorage.app",
    messagingSenderId: "416692703333",
    appId: "1:416692703333:web:d4b60292621435c748f68c"
  });

  const db = firebase.firestore();
  
  // Enable persistence
  db.enablePersistence().catch(err => {
    if (err.code == 'failed-precondition') {
      console.log('Multiple tabs open - persistence disabled');
    }
  });

  // ==================== GLOBAL VARIABLES ====================
  let allTransactions = [];
  let unsubscribeListener = null;
  
  // Month picker
  const monthPicker = document.getElementById('monthPicker');
  const today = new Date();
  const currentMonth = today.toISOString().substring(0,7);
  monthPicker.value = localStorage.getItem('expenses_month_filter') || currentMonth;
  
  // ==================== HELPER FUNCTIONS ====================
  function toast(message, type = 'success') {
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    
    let icon = 'check-circle';
    if (type === 'error') icon = 'times-circle';
    if (type === 'info') icon = 'info-circle';
    
    el.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
    wrap.appendChild(el);
    
    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(16px)';
      setTimeout(() => el.remove(), 300);
    }, 3500);
  }

  function formatNumber(num) {
    return Number(num).toLocaleString(undefined, { 
      minimumFractionDigits: 2, 
      maximumFractionDigits: 2 
    });
  }

  // Close all dropdowns when clicking outside
  document.addEventListener('click', function() {
    document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
      menu.classList.remove('show');
    });
  });

  // ==================== MODAL CONTROLS ====================
  window.openModal = function(mode, id = null) {
    const modal = document.getElementById('overlay');
    const title = document.getElementById('modalTitle');
    
    if (mode === 'add') {
      title.textContent = 'Add Transaction';
      document.getElementById('fId').value = '';
      document.getElementById('fDate').value = new Date().toISOString().substring(0,10);
      document.getElementById('fDesc').value = '';
      document.getElementById('fRef').value = '';
      document.getElementById('fAmount').value = '';
    } else if (mode === 'edit' && id) {
      title.textContent = 'Edit Transaction';
      const transaction = allTransactions.find(t => t.id === id);
      if (transaction) {
        document.getElementById('fId').value = transaction.id;
        document.getElementById('fDate').value = transaction.date || '';
        document.getElementById('fDesc').value = transaction.description || '';
        document.getElementById('fRef').value = transaction.reference || '';
        document.getElementById('fAmount').value = transaction.amount || '';
      }
    }
    
    document.getElementById('formErr').textContent = '';
    modal.classList.add('open');
  }
  
  window.closeModal = function() {
    document.getElementById('overlay').classList.remove('open');
  }
  
  window.bgClick = function(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  // ==================== DELETE CONTROLS ====================
  window.openDeleteModal = function(id) {
    document.getElementById('deleteId').value = id;
    document.getElementById('deleteOverlay').classList.add('open');
  }
  
  window.closeDeleteModal = function() {
    document.getElementById('deleteOverlay').classList.remove('open');
    document.getElementById('deleteId').value = '';
  }
  
  window.confirmDelete = async function() {
    const id = document.getElementById('deleteId').value;
    if (!id) return;
    
    try {
      await db.collection('Transactions').doc(id).delete();
      toast('Transaction deleted successfully', 'success');
      closeDeleteModal();
    } catch (error) {
      console.error('Delete error:', error);
      toast('Error: ' + error.message, 'error');
    }
  }

  // ==================== TOGGLE DROPDOWN ====================
  window.toggleMenu = function(event, id) {
    event.stopPropagation();
    
    // Close all other menus
    document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
      if (menu !== event.currentTarget.nextElementSibling) {
        menu.classList.remove('show');
      }
    });
    
    // Toggle this menu
    const menu = event.currentTarget.nextElementSibling;
    menu.classList.toggle('show');
  }

  // ==================== SAVE TRANSACTION ====================
  window.saveTxn = async function(e) {
    e.preventDefault();
    
    const errEl = document.getElementById('formErr');
    const btn = document.getElementById('saveBtn');
    errEl.textContent = '';

    const id = document.getElementById('fId').value;
    const date = document.getElementById('fDate').value;
    const desc = document.getElementById('fDesc').value.trim();
    const ref = document.getElementById('fRef').value.trim() || '—';
    const amount = parseFloat(document.getElementById('fAmount').value);

    // Validation
    if (!date) { errEl.textContent = 'Please select a date.'; return; }
    if (!desc) { errEl.textContent = 'Please enter a description.'; return; }
    if (isNaN(amount) || amount <= 0) { errEl.textContent = 'Please enter a valid positive amount.'; return; }

    // Disable button
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';

    try {
      const transactionData = {
        date: date,
        type: 'credit', // All expenses increase balance (you can change logic if needed)
        description: desc,
        reference: ref,
        amount: amount,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      if (id) {
        // Update existing
        await db.collection('Transactions').doc(id).update(transactionData);
        toast('Transaction updated successfully!', 'success');
      } else {
        // Add new
        transactionData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('Transactions').add(transactionData);
        toast('Transaction saved successfully!', 'success');
      }
      
      closeModal();
      
    } catch (error) {
      console.error('Save error:', error);
      toast('Error: ' + error.message, 'error');
      errEl.textContent = error.message;
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-check"></i> Save Transaction';
    }
  }

  // ==================== RENDER TABLE ====================
  function renderTable() {
    const tbody = document.getElementById('txnTbody');
    const selectedMonth = monthPicker.value;
    
    // Filter by month
    let filtered = allTransactions;
    if (selectedMonth) {
      filtered = allTransactions.filter(t => 
        t.date && t.date.substring(0,7) === selectedMonth
      );
    }
    
    // Sort by date (oldest first for running balance)
    filtered.sort((a, b) => (a.date || '').localeCompare(b.date || ''));

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="6">
        <i class="fas fa-inbox"></i> No transactions for ${selectedMonth || 'this period'}
      </td></tr>`;
      return;
    }

    // Calculate running balance
    let balance = 0;
    const rows = [];

    filtered.forEach(t => {
      // Calculate balance (all credits add)
      if (t.type === 'credit') balance += (t.amount || 0);
      else balance -= (t.amount || 0);

      rows.push(`
        <tr>
          <td>${t.date || '—'}</td>
          <td>${t.description || '—'}</td>
          <td style="color:var(--muted)">${t.reference || '—'}</td>
          <td class="amount-neutral">${formatNumber(t.amount || 0)}</td>
          <td class="amount-bal">${formatNumber(balance)}</td>
          <td style="text-align: center;">
            <div class="menu-container" onclick="event.stopPropagation()">
              <button class="action-btn" onclick="toggleMenu(event, '${t.id}')">
                <i class="fas fa-ellipsis-v"></i>
              </button>
              <div class="dropdown-menu">
                <button class="menu-item" onclick="openModal('edit', '${t.id}'); event.stopPropagation();">
                  <i class="fas fa-edit"></i> Edit
                </button>
                <button class="menu-item delete" onclick="openDeleteModal('${t.id}'); event.stopPropagation();">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </div>
            </div>
          </td>
        </tr>
      `);
    });

    tbody.innerHTML = rows.join('');
  }

  // ==================== SETUP FIREBASE LISTENER ====================
  function setupListener() {
    // Show loading
    document.getElementById('txnTbody').innerHTML = 
      '<tr class="empty-row"><td colspan="6"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
    
    // Clear existing listener
    if (unsubscribeListener) {
      unsubscribeListener();
    }
    
    // Set up real-time listener
    unsubscribeListener = db.collection('Transactions')
      .orderBy('date', 'desc')
      .onSnapshot(snapshot => {
        
        // Clear and rebuild transactions array
        allTransactions = [];
        
        snapshot.forEach(doc => {
          const data = doc.data();
          
          // Handle timestamps
          let createdAt = Date.now();
          if (data.createdAt && data.createdAt.seconds) {
            createdAt = data.createdAt.seconds * 1000;
          }
          
          allTransactions.push({
            id: doc.id,
            ...data,
            createdAt: createdAt
          });
        });
        
        // Update UI
        renderTable();
        
      }, error => {
        console.error('Listener error:', error);
        document.getElementById('txnTbody').innerHTML = 
          `<tr class="empty-row"><td colspan="6">
            <i class="fas fa-exclamation-triangle" style="color:#ef4444"></i> 
            Error: ${error.message}
          </td></tr>`;
        toast('Sync error: ' + error.message, 'error');
      });
  }

  // ==================== MONTH PICKER CHANGE ====================
  monthPicker.addEventListener('change', () => {
    localStorage.setItem('expenses_month_filter', monthPicker.value);
    renderTable();
  });

  // ==================== PDF EXPORT ====================
  document.getElementById('pdfBtn').addEventListener('click', () => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: 'landscape',
        unit: 'pt',
        format: 'a4'
      });
      
      const pageWidth = doc.internal.pageSize.getWidth();
      
      // Title
      doc.setFontSize(16);
      doc.setFont('helvetica', 'bold');
      doc.text('Trismart — EXPENSES Transactions', pageWidth/2, 40, { align: 'center' });
      
      // Month info
      doc.setFontSize(11);
      doc.setFont('helvetica', 'normal');
      doc.text(`Month: ${monthPicker.value || 'All Time'}`, pageWidth/2, 60, { align: 'center' });
      
      // Table headers
      const headers = ['Date', 'Description', 'Reference', 'Amount', 'Balance'];
      const colWidths = [90, 200, 130, 90, 90];
      let y = 100;
      let x = 20;
      
      // Draw headers
      doc.setFillColor(22, 22, 31);
      doc.rect(x, y-10, colWidths.reduce((a,b) => a+b, 0), 20, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      
      headers.forEach((header, i) => {
        doc.text(header, x + 5, y);
        x += colWidths[i];
      });
      
      // Reset for data
      y += 20;
      doc.setTextColor(0, 0, 0);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      
      // Get current filtered data
      const selectedMonth = monthPicker.value;
      let filtered = allTransactions;
      if (selectedMonth) {
        filtered = allTransactions.filter(t => 
          t.date && t.date.substring(0,7) === selectedMonth
        );
      }
      filtered.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      
      // Calculate running balance for PDF
      let balance = 0;
      
      // Draw data rows
      filtered.forEach(t => {
        if (t.type === 'credit') balance += (t.amount || 0);
        else balance -= (t.amount || 0);
        
        x = 20;
        const rowData = [
          t.date || '—',
          (t.description || '—').substring(0, 35),
          (t.reference || '—').substring(0, 20),
          formatNumber(t.amount || 0),
          formatNumber(balance)
        ];
        
        rowData.forEach((text, i) => {
          doc.text(text.toString(), x + 5, y);
          x += colWidths[i];
        });
        
        y += 20;
        
        // Add new page if needed
        if (y > 500) {
          doc.addPage();
          y = 40;
          
          // Redraw headers on new page
          x = 20;
          doc.setFillColor(22, 22, 31);
          doc.rect(x, y-10, colWidths.reduce((a,b) => a+b, 0), 20, 'F');
          doc.setTextColor(255, 255, 255);
          doc.setFont('helvetica', 'bold');
          
          headers.forEach((header, i) => {
            doc.text(header, x + 5, y);
            x += colWidths[i];
          });
          
          y += 20;
          doc.setTextColor(0, 0, 0);
          doc.setFont('helvetica', 'normal');
        }
      });
      
      // Save PDF
      doc.save(`Trismart_Expenses_${monthPicker.value || 'all'}.pdf`);
      toast('PDF generated successfully!', 'success');
      
    } catch (error) {
      console.error('PDF error:', error);
      toast('Error generating PDF: ' + error.message, 'error');
    }
  });

  // ==================== INITIAL SETUP ====================
  document.addEventListener('DOMContentLoaded', () => {
    setupListener();
  });

  // ==================== CLEANUP ====================
  window.addEventListener('beforeunload', () => {
    if (unsubscribeListener) {
      unsubscribeListener();
    }
  });
</script>
