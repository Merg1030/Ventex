<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trismart · Ledger with Balance Brought Forward</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e3a8a;
      --primary-light: #3b82f6;
      --accent: #0f172a;
      --success: #059669;
      --danger: #dc2626;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #475569;
      --radius: 16px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      color: var(--text-main);
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Topbar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .back-btn {
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    /* Main scroll */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    /* Account card */
    .account-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .account-details h1 {
      font-size: 1.35rem;
      font-weight: 800;
    }

    .balance-big {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--primary);
    }

    /* action row */
    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--primary);
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-outline {
      background: white;
      border: 1.5px solid var(--border);
      color: var(--text-main);
    }

    .btn-outline:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* month filter row */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--surface);
      padding: 0.5rem 1rem;
      border-radius: 60px;
      border: 1px solid var(--border);
    }

    .month-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      padding: 0.25rem 0.8rem;
      border-radius: 40px;
    }

    .month-filter input {
      border: none;
      background: transparent;
      font-weight: 600;
      font-size: 0.7rem;
      font-family: inherit;
      cursor: pointer;
    }

    .clear-filter {
      background: #fee2e2;
      border: none;
      padding: 0.25rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--danger);
      cursor: pointer;
    }

    .filter-badge {
      background: #e0e7ff;
      padding: 0.25rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--primary);
    }

    /* table */
    .ledger-table-container {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: auto;
      max-height: calc(100vh - 340px);
      box-shadow: var(--shadow-sm);
    }

    .ledger-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
      min-width: 700px;
    }

    .ledger-table th {
      text-align: left;
      padding: 0.9rem 0.8rem;
      background: #fefefe;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--text-muted);
      position: sticky;
      top: 0;
      background: white;
    }

    .ledger-table td {
      padding: 0.75rem 0.8rem;
      border-bottom: 1px solid #f0f2f5;
    }

    .debit {
      color: var(--danger);
      font-weight: 700;
    }

    .credit {
      color: var(--success);
      font-weight: 700;
    }

    .bf-row {
      background: #fefce8;
      font-weight: 600;
      border-left: 3px solid var(--primary-light);
    }

    .bf-row td:first-child {
      font-weight: 800;
    }

    .bf-label {
      background: #eef2ff;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 0.65rem;
      font-weight: 700;
      display: inline-block;
    }

    .action-btn {
      background: none;
      border: none;
      padding: 6px 10px;
      border-radius: 30px;
      cursor: pointer;
      color: var(--text-muted);
    }

    /* modals */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 24px;
      width: 90%;
      max-width: 460px;
      padding: 1.5rem;
    }

    .modal h3 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-size: 0.8rem;
    }

    .toast-wrap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: #1e293b;
      color: white;
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 0.75rem;
    }

    .transfer-badge {
      background: #e0f2fe;
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 30px;
      margin-left: 6px;
    }

    .dropdown-menu {
      position: fixed;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
      z-index: 200;
      min-width: 110px;
      border: 1px solid var(--border);
    }

    .dropdown-item {
      padding: 8px 14px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
    }

    .dropdown-item.danger {
      color: var(--danger);
    }

    .hidden-header {
      display: none !important;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo"><div class="logo-icon"><i class="fas fa-book-open"></i></div><span>Trismart · Running Ledger</span></div>
    <div class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Dashboard</div>
  </div>
  <div class="main-content">
    <div class="account-card" id="accountHeader">Loading account...</div>

    <div class="action-row">
      <div class="btn-group">
        <button class="btn" id="addTxBtn"><i class="fas fa-plus-circle"></i> Add Transaction</button>
        <button class="btn btn-outline" id="transferBtn"><i class="fas fa-exchange-alt"></i> Transfer</button>
      </div>
      <div class="filter-bar">
        <div class="month-filter"><i class="fas fa-calendar-alt"></i><input type="month" id="monthFilterInput"></div>
        <button class="clear-filter" id="clearFilterBtn" style="display:none;"><i class="fas fa-times"></i> Reset</button>
        <span id="filterBadge" class="filter-badge" style="display:none;"><i class="fas fa-filter"></i> <span></span></span>
      </div>
    </div>

    <div class="ledger-table-container">
      <table class="ledger-table">
        <thead>
          <tr><th>Date</th><th>Description</th><th>Debit (K)</th><th>Credit (K)</th><th>Running Balance (K)</th><th style="width:50px"></th></tr>
        </thead>
        <tbody id="ledgerTbody"><tr><td colspan="6">Loading ledger...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Transaction Modal -->
<div id="txModal" class="modal-overlay">
  <div class="modal">
    <h3 id="modalTitle">Add Transaction</h3>
    <div class="form-group"><label>Date</label><input type="date" id="txDate"></div>
    <div class="form-group"><label>Type</label><select id="txType"><option value="credit">Income (Credit)</option><option value="debit">Expense (Debit)</option></select></div>
    <div class="form-group"><label>Amount (K)</label><input type="number" id="txAmount" step="0.01" placeholder="0.00"></div>
    <div class="form-group"><label>Description</label><input type="text" id="txDesc" placeholder="e.g., Sales, Rent"></div>
    <div class="btn-group" style="margin-top: 1rem;"><button id="saveTxBtn" class="btn">Save</button><button id="closeTxBtn" class="btn btn-outline">Cancel</button></div>
  </div>
</div>

<!-- Transfer Modal -->
<div id="transferModal" class="modal-overlay">
  <div class="modal">
    <h3><i class="fas fa-exchange-alt"></i> Transfer Funds</h3>
    <div class="form-group"><label>From Account</label><input type="text" id="fromAccName" readonly style="background:#f1f5f9;"></div>
    <div class="form-group"><label>To Account</label><select id="toAccountSelect"></select></div>
    <div class="form-group"><label>Amount (K)</label><input type="number" id="transferAmount" step="0.01"></div>
    <div class="form-group"><label>Date</label><input type="date" id="transferDate"></div>
    <div class="form-group"><label>Description (optional)</label><input type="text" id="transferDesc" placeholder="Transfer notes"></div>
    <div class="btn-group"><button id="execTransferBtn" class="btn">Execute</button><button id="cancelTransferBtn" class="btn btn-outline">Cancel</button></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
  import { getFirestore, collection, query, where, addDoc, updateDoc, deleteDoc, doc, onSnapshot, runTransaction, getDocs } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",
    authDomain: "trismartstores.firebaseapp.com",
    projectId: "trismartstores",
    storageBucket: "trismartstores.appspot.com",
    messagingSenderId: "416692703333",
    appId: "1:416692703333:web:d4b60292621435c748f68c"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const loggedInUser = localStorage.getItem('loggedInUser') || '';
  const userName = (loggedInUser || localStorage.getItem('userName') || '').toLowerCase();
  if (userName !== 'chris') { document.body.innerHTML = '<div style="padding:30px">Unauthorized</div>'; throw new Error('Access Denied'); }

  const accountId = localStorage.getItem('selectedAccountId');
  if (!accountId) { toast('No account selected', 'error'); setTimeout(() => location.href = 'accounts-dashboard.html', 1500); }

  let currentAccount = null;
  let allTransactions = [];
  let allAccounts = [];
  let unsubscribeAccount, unsubscribeTrans, unsubscribeAccounts;
  let activeDropdown = null;

  // Filter and storage helpers
  const MONTH_FILTER_KEY = `trismart_month_filter_${accountId}`;
  function getStoredMonth() { return localStorage.getItem(MONTH_FILTER_KEY) || ''; }
  function setStoredMonth(val) { val ? localStorage.setItem(MONTH_FILTER_KEY, val) : localStorage.removeItem(MONTH_FILTER_KEY); }

  // Helper: get filtered & SORTED (ascending date) transactions
  function getFilteredAndSorted() {
    const monthFilter = getStoredMonth();
    let filtered = [...allTransactions];
    if (monthFilter) {
      filtered = filtered.filter(tx => tx.date && tx.date.startsWith(monthFilter));
    }
    // CRITICAL: ascending order (oldest first)
    return filtered.sort((a,b) => (a.date < b.date ? -1 : (a.date > b.date ? 1 : 0)));
  }

  // CORE: build ledger rows with Balance Brought Forward for each new month period
  // Each month block gets a "Balance Brought Forward" row at the beginning,
  // and transactions within month continue the running balance.
  function buildLedgerWithBroughtForward(transactions, accountOpeningBalance = 0) {
    if (!transactions.length && accountOpeningBalance === 0) return [];

    // Group transactions by month (YYYY-MM)
    const grouped = new Map(); // key: YYYY-MM, value: array of trans
    for (const tx of transactions) {
      const monthKey = tx.date.substring(0, 7);
      if (!grouped.has(monthKey)) grouped.set(monthKey, []);
      grouped.get(monthKey).push(tx);
    }

    // Sort months ascending
    const sortedMonths = Array.from(grouped.keys()).sort();
    const resultRows = [];
    let globalCarryBalance = accountOpeningBalance; // balance that carries month to month

    for (let i = 0; i < sortedMonths.length; i++) {
      const monthKey = sortedMonths[i];
      const monthTxs = grouped.get(monthKey);
      // sort transactions inside month by date ascending
      monthTxs.sort((a,b) => (a.date < b.date ? -1 : 1));
      
      // Brought forward row for this month
      const bfRow = {
        id: `bf_${monthKey}`,
        date: `${monthKey}-01`,
        description: `⟳ BALANCE BROUGHT FORWARD (${formatMonthYear(monthKey)})`,
        debit: null,
        credit: null,
        isBroughtForward: true,
        runningBalance: globalCarryBalance
      };
      resultRows.push(bfRow);
      
      // now compute running inside this month
      let monthRunning = globalCarryBalance;
      for (const tx of monthTxs) {
        const delta = tx.type === 'credit' ? tx.amount : -tx.amount;
        monthRunning += delta;
        resultRows.push({
          ...tx,
          runningBalance: monthRunning,
          isBroughtForward: false
        });
      }
      // after month ends, globalCarryBalance = last transaction balance (or same if empty)
      if (monthTxs.length > 0) {
        globalCarryBalance = monthRunning;
      }
      // else if month has no tx? but we only have month with txs.
    }
    return resultRows;
  }

  function formatMonthYear(ym) {
    const [y, m] = ym.split('-');
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return `${months[parseInt(m)-1]} ${y}`;
  }

  function renderLedger() {
    const tbody = document.getElementById('ledgerTbody');
    if (!currentAccount) { tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>'; return; }
    const filteredSorted = getFilteredAndSorted();
    // IMPORTANT: get opening balance from account (starting balance from account creation?)
    // For true continuity: openingBalance is account.balance - net of all transactions? Actually safest:
    // To compute initial balance before any transaction: we need total net effect of all tx. But since we store balance separately,
    // but we want the brought forward from previous months before first tx. we use currentAccount.balance minus sum of all tx? 
    // More robust: total cumulative from earliest month should reflect opening. But brought forward continuity: 
    // We compute net effect of all transactions & derive initial balance that makes account balance match after all tx.
    // Simpler: use first month's brought forward = starting balance of account (original balance). We'll store a startingBalance property or deduce:
    const totalTxImpact = allTransactions.reduce((sum, tx) => sum + (tx.type === 'credit' ? tx.amount : -tx.amount), 0);
    const derivedStartingBalance = (currentAccount.balance || 0) - totalTxImpact;
    const openingBalanceBeforeAnyTx = derivedStartingBalance;
    
    const ledgerRows = buildLedgerWithBroughtForward(filteredSorted, openingBalanceBeforeAnyTx);
    
    if (ledgerRows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6">No transactions. Add entry to see running balance with brought forward.</td></tr>`;
      return;
    }
    
    tbody.innerHTML = ledgerRows.map(row => {
      if (row.isBroughtForward) {
        // special styling for brought forward row
        return `
          <tr class="bf-row" style="background:#fef9e3;">
            <td><strong>${row.date}</strong></td>
            <td><span class="bf-label"><i class="fas fa-forward"></i> ${escapeHtml(row.description)}</span></td>
            <td>—</td>
            <td>—</td>
            <td class="balance-amount" style="font-weight:800; color:#1e3a8a;">K${row.runningBalance.toFixed(2)}</td>
            <td></td>
          </tr>
        `;
      }
      const isDebit = row.type === 'debit';
      const debitDisplay = isDebit ? `K${row.amount.toFixed(2)}` : '';
      const creditDisplay = !isDebit ? `K${row.amount.toFixed(2)}` : '';
      const transferTag = row.isTransfer ? '<span class="transfer-badge"><i class="fas fa-exchange-alt"></i> transfer</span>' : '';
      return `
        <tr>
          <td>${row.date || '-'}</td>
          <td><strong>${escapeHtml(row.description || '')}</strong> ${transferTag}</td>
          <td class="debit">${debitDisplay}</td>
          <td class="credit">${creditDisplay}</td>
          <td class="balance-amount">K${(row.runningBalance || 0).toFixed(2)}</td>
          <td class="action-cell"><button class="action-btn" data-txn-id="${row.id}" data-action-menu><i class="fas fa-ellipsis-v"></i></button></td>
        </tr>
      `;
    }).join('');
    
    // attach dropdowns for real transactions only (ignore bf rows)
    document.querySelectorAll('[data-action-menu]').forEach(btn => {
      const id = btn.getAttribute('data-txn-id');
      if (id && !id.startsWith('bf_')) {
        btn.removeEventListener('click', dropdownHandler);
        btn.addEventListener('click', dropdownHandler);
      } else {
        btn.style.opacity = '0.4';
        btn.disabled = true;
      }
    });
  }

  function dropdownHandler(e) {
    e.stopPropagation();
    const txnId = this.getAttribute('data-txn-id');
    if (!txnId || txnId.startsWith('bf_')) return;
    closeDropdown();
    const rect = this.getBoundingClientRect();
    const div = document.createElement('div');
    div.className = 'dropdown-menu';
    div.style.position = 'fixed';
    div.style.top = `${rect.bottom + 4}px`;
    div.style.left = `${rect.left - 30}px`;
    div.innerHTML = `<div class="dropdown-item" data-act="edit"><i class="fas fa-pen"></i> Edit</div><div class="dropdown-item danger" data-act="delete"><i class="fas fa-trash"></i> Delete</div>`;
    document.body.appendChild(div);
    activeDropdown = div;
    div.querySelector('[data-act="edit"]').addEventListener('click', () => { editTransaction(txnId); closeDropdown(); });
    div.querySelector('[data-act="delete"]').addEventListener('click', () => { deleteTransaction(txnId); closeDropdown(); });
    setTimeout(() => document.addEventListener('click', () => closeDropdown(), { once: true }), 10);
  }

  function closeDropdown() { if (activeDropdown) { activeDropdown.remove(); activeDropdown = null; } }

  function editTransaction(txId) {
    const tx = allTransactions.find(t => t.id === txId);
    if (!tx) return;
    document.getElementById('modalTitle').innerText = 'Edit Transaction';
    document.getElementById('txDate').value = tx.date;
    document.getElementById('txType').value = tx.type;
    document.getElementById('txAmount').value = tx.amount;
    document.getElementById('txDesc').value = tx.description;
    window._editingId = txId;
    document.getElementById('txModal').classList.add('show');
  }

  async function deleteTransaction(txId) {
    if (!confirm('Delete transaction? Balance will revert.')) return;
    const tx = allTransactions.find(t => t.id === txId);
    if (!tx) return;
    try {
      await runTransaction(db, async (txRun) => {
        const accRef = doc(db, 'accounts', accountId);
        const snap = await txRun.get(accRef);
        let bal = Number(snap.data().balance);
        const delta = tx.type === 'credit' ? -tx.amount : tx.amount;
        txRun.update(accRef, { balance: bal + delta });
        txRun.delete(doc(db, 'account_transactions', txId));
      });
      toast('Transaction removed', 'success');
    } catch (err) { toast(err.message, 'error'); }
  }

  async function saveTransactionHandler() {
    const date = document.getElementById('txDate').value;
    const type = document.getElementById('txType').value;
    const amount = parseFloat(document.getElementById('txAmount').value);
    const desc = document.getElementById('txDesc').value.trim();
    if (!date || isNaN(amount) || amount <= 0 || !desc) { toast('Valid date, amount>0, description', 'error'); return; }
    const editingId = window._editingId;
    try {
      if (editingId) {
        const oldTx = allTransactions.find(t => t.id === editingId);
        if (!oldTx) throw new Error('Missing');
        const oldDelta = oldTx.type === 'credit' ? oldTx.amount : -oldTx.amount;
        const newDelta = type === 'credit' ? amount : -amount;
        const delta = newDelta - oldDelta;
        await runTransaction(db, async (txRun) => {
          const accRef = doc(db, 'accounts', accountId);
          const snap = await txRun.get(accRef);
          txRun.update(accRef, { balance: Number(snap.data().balance) + delta });
          txRun.update(doc(db, 'account_transactions', editingId), { date, type, amount, description: desc });
        });
        toast('Transaction updated');
      } else {
        await runTransaction(db, async (txRun) => {
          const accRef = doc(db, 'accounts', accountId);
          const snap = await txRun.get(accRef);
          let newBal = Number(snap.data().balance) + (type === 'credit' ? amount : -amount);
          txRun.update(accRef, { balance: newBal });
          txRun.set(doc(collection(db, 'account_transactions')), {
            accountId, accountName: currentAccount?.name, date, type, amount, description: desc, createdAt: new Date().toISOString()
          });
        });
        toast('Transaction added ✓');
      }
      window._editingId = null;
      document.getElementById('txModal').classList.remove('show');
      document.getElementById('txDate').value = '';
      document.getElementById('txAmount').value = '';
    } catch (err) { toast(err.message, 'error'); }
  }

  // Transfer logic and subscriptions...
  async function openTransfer() {
    if (!currentAccount) return;
    document.getElementById('fromAccName').value = currentAccount.name;
    document.getElementById('transferAmount').value = '';
    document.getElementById('transferDate').valueAsDate = new Date();
    const select = document.getElementById('toAccountSelect');
    select.innerHTML = '<option value="">-- select --</option>';
    allAccounts.forEach(acc => { if (acc.id !== accountId) select.innerHTML += `<option value="${acc.id}">${escapeHtml(acc.name)}</option>`; });
    document.getElementById('transferModal').classList.add('show');
  }

  document.getElementById('execTransferBtn').onclick = async () => {
    const toId = document.getElementById('toAccountSelect').value;
    const amount = parseFloat(document.getElementById('transferAmount').value);
    const date = document.getElementById('transferDate').value;
    const desc = document.getElementById('transferDesc').value.trim() || 'Transfer';
    if (!toId || isNaN(amount) || amount <= 0 || !date) { toast('Fill all fields', 'error'); return; }
    const toAcc = allAccounts.find(a => a.id === toId);
    if (!toAcc) return;
    if (currentAccount.balance < amount) { toast('Insufficient funds', 'error'); return; }
    try {
      await runTransaction(db, async (tx) => {
        const fromRef = doc(db, 'accounts', accountId);
        const toRef = doc(db, 'accounts', toId);
        const fSnap = await tx.get(fromRef);
        const tSnap = await tx.get(toRef);
        let fBal = Number(fSnap.data().balance), tBal = Number(tSnap.data().balance);
        tx.update(fromRef, { balance: fBal - amount });
        tx.update(toRef, { balance: tBal + amount });
        tx.set(doc(collection(db, 'account_transactions')), { accountId, accountName: currentAccount.name, date, type: 'debit', amount, description: `Transfer to ${toAcc.name}: ${desc}`, createdAt: new Date().toISOString(), isTransfer: true, linkedAccountId: toId });
        tx.set(doc(collection(db, 'account_transactions')), { accountId: toId, accountName: toAcc.name, date, type: 'credit', amount, description: `Transfer from ${currentAccount.name}: ${desc}`, createdAt: new Date().toISOString(), isTransfer: true, linkedAccountId: accountId });
      });
      toast(`Transferred K${amount.toFixed(2)}`);
      document.getElementById('transferModal').classList.remove('show');
    } catch(err) { toast(err.message, 'error'); }
  };

  function loadAccount() { unsubscribeAccount = onSnapshot(doc(db, 'accounts', accountId), (docSnap) => { if(docSnap.exists()) { currentAccount = { id: docSnap.id, ...docSnap.data(), balance: Number(docSnap.data().balance) || 0 }; document.getElementById('accountHeader').innerHTML = `<div><h1>${escapeHtml(currentAccount.name)}</h1><div style="color:var(--text-muted);">${currentAccount.type || 'Asset'}</div></div><div class="balance-big">K${currentAccount.balance.toFixed(2)}</div>`; renderLedger(); } }); }
  function loadTransactions() { unsubscribeTrans = onSnapshot(query(collection(db, 'account_transactions'), where('accountId', '==', accountId)), (snap) => { allTransactions = snap.docs.map(d => ({ id: d.id, ...d.data(), amount: Number(d.data().amount) || 0 })); renderLedger(); }); }
  function loadAllAccounts() { unsubscribeAccounts = onSnapshot(collection(db, 'accounts'), (snap) => { allAccounts = snap.docs.map(d => ({ id: d.id, ...d.data() })); }); }

  function initUI() {
    const monthInput = document.getElementById('monthFilterInput');
    const saved = getStoredMonth();
    if (saved) { monthInput.value = saved; showFilterBadge(saved); }
    monthInput.addEventListener('change', () => { setStoredMonth(monthInput.value); if(monthInput.value) showFilterBadge(monthInput.value); else hideFilterBadge(); renderLedger(); });
    document.getElementById('clearFilterBtn').onclick = () => { monthInput.value = ''; setStoredMonth(''); hideFilterBadge(); renderLedger(); };
    document.getElementById('addTxBtn').onclick = () => { window._editingId = null; document.getElementById('modalTitle').innerText = 'Add Transaction'; document.getElementById('txDate').valueAsDate = new Date(); document.getElementById('txAmount').value = ''; document.getElementById('txDesc').value = ''; document.getElementById('txModal').classList.add('show'); };
    document.getElementById('transferBtn').onclick = openTransfer;
    document.getElementById('saveTxBtn').onclick = saveTransactionHandler;
    document.getElementById('closeTxBtn').onclick = () => document.getElementById('txModal').classList.remove('show');
    document.getElementById('cancelTransferBtn').onclick = () => document.getElementById('transferModal').classList.remove('show');
    document.getElementById('backBtn').onclick = () => location.href = 'accounts-dashboard.html';
    window.addEventListener('click', (e) => { if (!e.target.closest('.dropdown-menu')) closeDropdown(); });
  }

  function showFilterBadge(val) { const b = document.getElementById('filterBadge'); b.style.display = 'inline-flex'; b.querySelector('span').innerText = formatMonthYear(val); document.getElementById('clearFilterBtn').style.display = 'inline-flex'; }
  function hideFilterBadge() { document.getElementById('filterBadge').style.display = 'none'; document.getElementById('clearFilterBtn').style.display = 'none'; }
  function toast(msg, type='info') { const wrap = document.getElementById('toastWrap'); const div = document.createElement('div'); div.className = 'toast'; div.innerHTML = `<i class="fas ${type==='error'?'fa-circle-exclamation':'fa-check-circle'}"></i> ${msg}`; wrap.appendChild(div); setTimeout(()=>div.remove(), 3000); }
  function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  initUI(); loadAccount(); loadTransactions(); loadAllAccounts();
</script>
</body>
