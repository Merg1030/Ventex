<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trismart · Ledger with Balance Brought Forward</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e3a8a;
      --primary-light: #3b82f6;
      --success: #059669;
      --danger: #dc2626;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #475569;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .back-btn {
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .account-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .account-details h1 {
      font-size: 1.35rem;
      font-weight: 800;
    }

    .balance-big {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.75rem;
      border: none;
      cursor: pointer;
      background: var(--primary);
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-outline {
      background: white;
      border: 1.5px solid var(--border);
      color: var(--text-main);
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      padding: 0.5rem 1rem;
      border-radius: 60px;
      border: 1px solid var(--border);
    }

    .month-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      padding: 0.25rem 0.8rem;
      border-radius: 40px;
    }

    .month-filter input {
      border: none;
      background: transparent;
      font-weight: 600;
      font-size: 0.7rem;
      font-family: inherit;
      cursor: pointer;
    }

    .clear-filter {
      background: #fee2e2;
      border: none;
      padding: 0.25rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--danger);
      cursor: pointer;
    }

    .filter-badge {
      background: #e0e7ff;
      padding: 0.25rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--primary);
    }

    .ledger-table-container {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: auto;
      max-height: calc(100vh - 340px);
    }

    .ledger-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
      min-width: 700px;
    }

    .ledger-table th {
      text-align: left;
      padding: 0.9rem 0.8rem;
      background: white;
      border-bottom: 2px solid var(--border);
      font-weight: 700;
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--text-muted);
      position: sticky;
      top: 0;
    }

    .ledger-table td {
      padding: 0.75rem 0.8rem;
      border-bottom: 1px solid #f0f2f5;
    }

    .debit {
      color: var(--danger);
      font-weight: 700;
    }

    .credit {
      color: var(--success);
      font-weight: 700;
    }

    .bf-row {
      background: #fefce8;
      border-left: 4px solid var(--primary-light);
    }

    .bf-row td {
      font-weight: 600;
    }

    .bf-label {
      background: #e0e7ff;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      display: inline-block;
    }

    .transfer-badge {
      background: #e0f2fe;
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 30px;
      margin-left: 6px;
    }

    .action-btn {
      background: none;
      border: none;
      padding: 6px 10px;
      border-radius: 30px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 24px;
      width: 90%;
      max-width: 460px;
      padding: 1.5rem;
    }

    .modal h3 {
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      display: block;
      margin-bottom: 4px;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 0.6rem;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-size: 0.8rem;
    }

    .toast-wrap {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
    }

    .toast {
      background: #1e293b;
      color: white;
      padding: 10px 18px;
      border-radius: 40px;
      font-size: 0.75rem;
      margin-top: 8px;
    }

    .dropdown-menu {
      position: fixed;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      z-index: 200;
      min-width: 110px;
      border: 1px solid var(--border);
    }

    .dropdown-item {
      padding: 8px 14px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
    }

    .dropdown-item.danger {
      color: var(--danger);
    }

    .dropdown-item:hover {
      background: #f1f5f9;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo"><div class="logo-icon"><i class="fas fa-book-open"></i></div><span>Trismart · Running Ledger</span></div>
    <div class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Dashboard</div>
  </div>
  <div class="main-content">
    <div class="account-card" id="accountHeader">Loading...</div>

    <div class="action-row">
      <div class="btn-group">
        <button class="btn" id="addTxBtn"><i class="fas fa-plus-circle"></i> Add Transaction</button>
        <button class="btn btn-outline" id="transferBtn"><i class="fas fa-exchange-alt"></i> Transfer</button>
      </div>
      <div class="filter-bar">
        <div class="month-filter"><i class="fas fa-calendar-alt"></i><input type="month" id="monthFilterInput" placeholder="Filter by month"></div>
        <button class="clear-filter" id="clearFilterBtn" style="display:none;"><i class="fas fa-times"></i> Clear</button>
        <span id="filterBadge" class="filter-badge" style="display:none;"></span>
      </div>
    </div>

    <div class="ledger-table-container">
      <table class="ledger-table">
        <thead>
          <tr><th>Date</th><th>Description</th><th>Debit (K)</th><th>Credit (K)</th><th>Balance (K)</th><th></th></tr>
        </thead>
        <tbody id="ledgerTbody"><tr><td colspan="6">Loading...<\/td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Transaction Modal -->
<div id="txModal" class="modal-overlay">
  <div class="modal">
    <h3 id="modalTitle">Add Transaction</h3>
    <div class="form-group"><label>Date</label><input type="date" id="txDate"></div>
    <div class="form-group"><label>Type</label><select id="txType"><option value="credit">Income (Credit)</option><option value="debit">Expense (Debit)</option></select></div>
    <div class="form-group"><label>Amount (K)</label><input type="number" id="txAmount" step="0.01" placeholder="0.00"></div>
    <div class="form-group"><label>Description</label><input type="text" id="txDesc" placeholder="e.g., Sales, Rent"></div>
    <div class="btn-group"><button id="saveTxBtn" class="btn">Save</button><button id="closeTxBtn" class="btn btn-outline">Cancel</button></div>
  </div>
</div>

<!-- Transfer Modal -->
<div id="transferModal" class="modal-overlay">
  <div class="modal">
    <h3><i class="fas fa-exchange-alt"></i> Transfer Funds</h3>
    <div class="form-group"><label>From Account</label><input type="text" id="fromAccName" readonly style="background:#f1f5f9;"></div>
    <div class="form-group"><label>To Account</label><select id="toAccountSelect"></select></div>
    <div class="form-group"><label>Amount (K)</label><input type="number" id="transferAmount" step="0.01"></div>
    <div class="form-group"><label>Date</label><input type="date" id="transferDate"></div>
    <div class="form-group"><label>Description</label><input type="text" id="transferDesc" placeholder="Transfer notes"></div>
    <div class="btn-group"><button id="execTransferBtn" class="btn">Execute</button><button id="cancelTransferBtn" class="btn btn-outline">Cancel</button></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
  import { getFirestore, collection, query, where, addDoc, updateDoc, deleteDoc, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-lm7Y3r1F6VvY8PKvY8glLabZDbJsHM1k",
    authDomain: "trismartstores.firebaseapp.com",
    projectId: "trismartstores",
    storageBucket: "trismartstores.appspot.com",
    messagingSenderId: "416692703333",
    appId: "1:416692703333:web:d4b60292621435c748f68c"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  // NO ACCESS RESTRICTION - anyone can use it
  // (You can re-enable the check below if needed)

  const accountId = localStorage.getItem('selectedAccountId');
  if (!accountId) { 
    toast('No account selected'); 
    setTimeout(() => location.href = 'accounts-dashboard.html', 1500); 
  }

  let currentAccount = null;
  let allTransactions = [];
  let allAccounts = [];
  let unsubscribeAccount, unsubscribeTrans, unsubscribeAccounts;
  let activeDropdown = null;
  let editingId = null;

  // Month filter storage
  const MONTH_FILTER_KEY = `trismart_month_filter_${accountId}`;
  function getStoredMonth() { return localStorage.getItem(MONTH_FILTER_KEY) || ''; }
  function setStoredMonth(val) { val ? localStorage.setItem(MONTH_FILTER_KEY, val) : localStorage.removeItem(MONTH_FILTER_KEY); }

  // Get filtered transactions sorted by date (oldest first)
  function getFilteredAndSorted() {
    const monthFilter = getStoredMonth();
    let filtered = [...allTransactions];
    if (monthFilter) {
      filtered = filtered.filter(tx => tx.date && tx.date.startsWith(monthFilter));
    }
    return filtered.sort((a, b) => a.date.localeCompare(b.date));
  }

  // Get all transactions from ALL months (for calculating previous month balances)
  function getAllTransactionsSorted() {
    return [...allTransactions].sort((a, b) => a.date.localeCompare(b.date));
  }

  // Format month name
  function formatMonthYear(ym) {
    const [y, m] = ym.split('-');
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    return `${months[parseInt(m)-1]} ${y}`;
  }

  // Get the previous month's closing balance for the current filtered month
  function getPreviousMonthClosingBalance(currentFilterMonth) {
    if (!currentFilterMonth) return null;
    
    // Get all transactions from ALL time
    const allSorted = getAllTransactionsSorted();
    if (allSorted.length === 0) return null;
    
    // Find the last transaction date BEFORE the current filter month
    let lastTxBeforeMonth = null;
    for (const tx of allSorted) {
      if (tx.date >= currentFilterMonth) break;
      lastTxBeforeMonth = tx;
    }
    
    if (lastTxBeforeMonth) {
      // Calculate balance including all transactions up to that point
      let balance = currentAccount?.startingBalance || 0;
      for (const tx of allSorted) {
        if (tx.date > lastTxBeforeMonth.date) break;
        balance += tx.type === 'credit' ? tx.amount : -tx.amount;
      }
      return balance;
    }
    
    // No transactions before this month, use starting balance if any
    return currentAccount?.startingBalance || null;
  }

  // Build ledger with Balance Brought Forward for the filtered month
  function buildLedgerWithBroughtForward() {
    const monthFilter = getStoredMonth();
    let filteredTxs = getFilteredAndSorted();
    
    if (!monthFilter) {
      // No filter: show all transactions with no BF rows (standard view)
      let running = currentAccount?.startingBalance || 0;
      const allSorted = getAllTransactionsSorted();
      const rows = [];
      for (const tx of allSorted) {
        running += tx.type === 'credit' ? tx.amount : -tx.amount;
        rows.push({ ...tx, runningBalance: running, isBroughtForward: false });
      }
      return rows;
    }
    
    // WITH MONTH FILTER: show Brought Forward from previous month
    const previousClosing = getPreviousMonthClosingBalance(monthFilter);
    const rows = [];
    
    // Add Balance Brought Forward row
    if (previousClosing !== null && previousClosing !== 0) {
      rows.push({
        id: `bf_${monthFilter}`,
        date: `${monthFilter}-01`,
        description: `BALANCE BROUGHT FORWARD (from ${formatMonthYear(getPreviousMonthKey(monthFilter))})`,
        debit: null,
        credit: null,
        runningBalance: previousClosing,
        isBroughtForward: true
      });
    }
    
    // Add current month's transactions with running balance
    let running = previousClosing !== null ? previousClosing : (currentAccount?.startingBalance || 0);
    for (const tx of filteredTxs) {
      running += tx.type === 'credit' ? tx.amount : -tx.amount;
      rows.push({ ...tx, runningBalance: running, isBroughtForward: false });
    }
    
    return rows;
  }
  
  function getPreviousMonthKey(currentMonth) {
    const [year, month] = currentMonth.split('-').map(Number);
    let prevYear = year;
    let prevMonth = month - 1;
    if (prevMonth === 0) {
      prevMonth = 12;
      prevYear--;
    }
    return `${prevYear}-${String(prevMonth).padStart(2, '0')}`;
  }

  function renderLedger() {
    const tbody = document.getElementById('ledgerTbody');
    if (!currentAccount) { tbody.innerHTML = '<tr><td colspan="6">Loading...<\/td><\/tr>'; return; }
    
    const ledgerRows = buildLedgerWithBroughtForward();
    
    if (ledgerRows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6">No transactions. Click "Add Transaction" to start.<\/td><\/tr>';
      return;
    }
    
    tbody.innerHTML = ledgerRows.map(row => {
      if (row.isBroughtForward) {
        return `
          <tr class="bf-row">
            <td style="font-weight:700;">${row.date}<\/td>
            <td><span class="bf-label"><i class="fas fa-arrow-right"></i> ${row.description}<\/span><\/td>
            <td>—<\/td>
            <td>—<\/td>
            <td style="font-weight:800; color:#1e3a8a;">K${row.runningBalance.toFixed(2)}<\/td>
            <td><\/td>
          <\/tr>
        `;
      }
      
      const isDebit = row.type === 'debit';
      const debitDisplay = isDebit ? `K${row.amount.toFixed(2)}` : '';
      const creditDisplay = !isDebit ? `K${row.amount.toFixed(2)}` : '';
      const transferTag = row.isTransfer ? '<span class="transfer-badge"><i class="fas fa-exchange-alt"></i> transfer</span>' : '';
      
      return `
        <tr>
          <td>${row.date || '-'}<\/td>
          <td><strong>${escapeHtml(row.description || '')}<\/strong> ${transferTag}<\/td>
          <td class="debit">${debitDisplay}<\/td>
          <td class="credit">${creditDisplay}<\/td>
          <td class="balance">K${row.runningBalance.toFixed(2)}<\/td>
          <td class="action-cell"><button class="action-btn" data-txn-id="${row.id}"><i class="fas fa-ellipsis-v"><\/i><\/button><\/td>
        <\/tr>
      `;
    }).join('');
    
    // Attach dropdown handlers
    document.querySelectorAll('[data-txn-id]').forEach(btn => {
      const id = btn.getAttribute('data-txn-id');
      if (id && !id.startsWith('bf_')) {
        btn.onclick = (e) => showDropdown(e, id);
      }
    });
  }

  function showDropdown(event, txId) {
    event.stopPropagation();
    closeDropdown();
    const rect = event.currentTarget.getBoundingClientRect();
    const div = document.createElement('div');
    div.className = 'dropdown-menu';
    div.style.position = 'fixed';
    div.style.top = `${rect.bottom + 4}px`;
    div.style.left = `${rect.left - 30}px`;
    div.innerHTML = `
      <div class="dropdown-item" data-action="edit"><i class="fas fa-pen"></i> Edit</div>
      <div class="dropdown-item danger" data-action="delete"><i class="fas fa-trash"></i> Delete</div>
    `;
    document.body.appendChild(div);
    activeDropdown = div;
    
    div.querySelector('[data-action="edit"]').onclick = () => { editTransaction(txId); closeDropdown(); };
    div.querySelector('[data-action="delete"]').onclick = () => { deleteTransaction(txId); closeDropdown(); };
    setTimeout(() => document.addEventListener('click', () => closeDropdown(), { once: true }), 10);
  }

  function closeDropdown() { if (activeDropdown) { activeDropdown.remove(); activeDropdown = null; } }

  async function editTransaction(txId) {
    const tx = allTransactions.find(t => t.id === txId);
    if (!tx) return;
    document.getElementById('modalTitle').innerText = 'Edit Transaction';
    document.getElementById('txDate').value = tx.date;
    document.getElementById('txType').value = tx.type;
    document.getElementById('txAmount').value = tx.amount;
    document.getElementById('txDesc').value = tx.description;
    editingId = txId;
    document.getElementById('txModal').classList.add('show');
  }

  async function deleteTransaction(txId) {
    if (!confirm('Delete this transaction?')) return;
    const tx = allTransactions.find(t => t.id === txId);
    if (!tx) return;
    try {
      await runTransaction(db, async (txRun) => {
        const accRef = doc(db, 'accounts', accountId);
        const snap = await txRun.get(accRef);
        let bal = Number(snap.data().balance);
        const delta = tx.type === 'credit' ? -tx.amount : tx.amount;
        txRun.update(accRef, { balance: bal + delta });
        txRun.delete(doc(db, 'account_transactions', txId));
      });
      toast('Transaction deleted');
    } catch (err) { toast(err.message, 'error'); }
  }

  async function saveTransaction() {
    const date = document.getElementById('txDate').value;
    const type = document.getElementById('txType').value;
    const amount = parseFloat(document.getElementById('txAmount').value);
    const desc = document.getElementById('txDesc').value.trim();
    
    if (!date || isNaN(amount) || amount <= 0 || !desc) {
      toast('Please fill all fields correctly', 'error');
      return;
    }
    
    try {
      if (editingId) {
        const oldTx = allTransactions.find(t => t.id === editingId);
        if (!oldTx) throw new Error('Transaction not found');
        const oldDelta = oldTx.type === 'credit' ? oldTx.amount : -oldTx.amount;
        const newDelta = type === 'credit' ? amount : -amount;
        const delta = newDelta - oldDelta;
        await runTransaction(db, async (txRun) => {
          const accRef = doc(db, 'accounts', accountId);
          const snap = await txRun.get(accRef);
          txRun.update(accRef, { balance: Number(snap.data().balance) + delta });
          txRun.update(doc(db, 'account_transactions', editingId), { date, type, amount, description: desc });
        });
        toast('Transaction updated');
      } else {
        await runTransaction(db, async (txRun) => {
          const accRef = doc(db, 'accounts', accountId);
          const snap = await txRun.get(accRef);
          const newBal = Number(snap.data().balance) + (type === 'credit' ? amount : -amount);
          txRun.update(accRef, { balance: newBal });
          txRun.set(doc(collection(db, 'account_transactions')), {
            accountId, accountName: currentAccount?.name, date, type, amount, description: desc, createdAt: new Date().toISOString()
          });
        });
        toast('Transaction added');
      }
      editingId = null;
      document.getElementById('txModal').classList.remove('show');
      document.getElementById('txDate').value = '';
      document.getElementById('txAmount').value = '';
      document.getElementById('txDesc').value = '';
    } catch (err) { toast(err.message, 'error'); }
  }

  async function openTransfer() {
    if (!currentAccount) return;
    document.getElementById('fromAccName').value = currentAccount.name;
    document.getElementById('transferAmount').value = '';
    document.getElementById('transferDate').valueAsDate = new Date();
    const select = document.getElementById('toAccountSelect');
    select.innerHTML = '<option value="">-- Select account --</option>';
    allAccounts.forEach(acc => {
      if (acc.id !== accountId) {
        select.innerHTML += `<option value="${acc.id}">${escapeHtml(acc.name)}</option>`;
      }
    });
    document.getElementById('transferModal').classList.add('show');
  }

  async function executeTransfer() {
    const toId = document.getElementById('toAccountSelect').value;
    const amount = parseFloat(document.getElementById('transferAmount').value);
    const date = document.getElementById('transferDate').value;
    const desc = document.getElementById('transferDesc').value.trim() || 'Transfer';
    
    if (!toId || isNaN(amount) || amount <= 0 || !date) {
      toast('Please fill all fields', 'error');
      return;
    }
    
    const toAcc = allAccounts.find(a => a.id === toId);
    if (!toAcc) return;
    if (currentAccount.balance < amount) {
      toast('Insufficient funds', 'error');
      return;
    }
    
    try {
      await runTransaction(db, async (tx) => {
        const fromRef = doc(db, 'accounts', accountId);
        const toRef = doc(db, 'accounts', toId);
        const fSnap = await tx.get(fromRef);
        const tSnap = await tx.get(toRef);
        tx.update(fromRef, { balance: Number(fSnap.data().balance) - amount });
        tx.update(toRef, { balance: Number(tSnap.data().balance) + amount });
        tx.set(doc(collection(db, 'account_transactions')), {
          accountId, accountName: currentAccount.name, date, type: 'debit', amount, description: `Transfer to ${toAcc.name}: ${desc}`, createdAt: new Date().toISOString(), isTransfer: true
        });
        tx.set(doc(collection(db, 'account_transactions')), {
          accountId: toId, accountName: toAcc.name, date, type: 'credit', amount, description: `Transfer from ${currentAccount.name}: ${desc}`, createdAt: new Date().toISOString(), isTransfer: true
        });
      });
      toast(`Transferred K${amount.toFixed(2)} to ${toAcc.name}`);
      document.getElementById('transferModal').classList.remove('show');
    } catch (err) { toast(err.message, 'error'); }
  }

  // Firebase subscriptions
  function loadAccount() {
    unsubscribeAccount = onSnapshot(doc(db, 'accounts', accountId), (docSnap) => {
      if (docSnap.exists()) {
        currentAccount = { id: docSnap.id, ...docSnap.data(), balance: Number(docSnap.data().balance) || 0, startingBalance: Number(docSnap.data().startingBalance) || 0 };
        document.getElementById('accountHeader').innerHTML = `
          <div class="account-details"><h1>${escapeHtml(currentAccount.name)}</h1><div style="color:var(--text-muted);">${currentAccount.type || 'Asset'}</div></div>
          <div class="balance-big">K${currentAccount.balance.toFixed(2)}</div>
        `;
        renderLedger();
      }
    });
  }
  
  function loadTransactions() {
    unsubscribeTrans = onSnapshot(query(collection(db, 'account_transactions'), where('accountId', '==', accountId)), (snap) => {
      allTransactions = snap.docs.map(d => ({ id: d.id, ...d.data(), amount: Number(d.data().amount) || 0 }));
      renderLedger();
    });
  }
  
  function loadAllAccounts() {
    unsubscribeAccounts = onSnapshot(collection(db, 'accounts'), (snap) => {
      allAccounts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    });
  }

  // UI setup
  function initUI() {
    const monthInput = document.getElementById('monthFilterInput');
    const saved = getStoredMonth();
    if (saved) { monthInput.value = saved; updateFilterBadge(saved); }
    
    monthInput.addEventListener('change', () => {
      setStoredMonth(monthInput.value);
      if (monthInput.value) updateFilterBadge(monthInput.value);
      else clearFilterBadge();
      renderLedger();
    });
    
    document.getElementById('clearFilterBtn').onclick = () => {
      monthInput.value = '';
      setStoredMonth('');
      clearFilterBadge();
      renderLedger();
    };
    
    document.getElementById('addTxBtn').onclick = () => {
      editingId = null;
      document.getElementById('modalTitle').innerText = 'Add Transaction';
      document.getElementById('txDate').valueAsDate = new Date();
      document.getElementById('txAmount').value = '';
      document.getElementById('txDesc').value = '';
      document.getElementById('txModal').classList.add('show');
    };
    
    document.getElementById('transferBtn').onclick = openTransfer;
    document.getElementById('saveTxBtn').onclick = saveTransaction;
    document.getElementById('closeTxBtn').onclick = () => document.getElementById('txModal').classList.remove('show');
    document.getElementById('execTransferBtn').onclick = executeTransfer;
    document.getElementById('cancelTransferBtn').onclick = () => document.getElementById('transferModal').classList.remove('show');
    document.getElementById('backBtn').onclick = () => location.href = 'accounts-dashboard.html';
    window.addEventListener('click', (e) => { if (!e.target.closest('.dropdown-menu')) closeDropdown(); });
  }
  
  function updateFilterBadge(month) {
    const badge = document.getElementById('filterBadge');
    badge.innerHTML = `<i class="fas fa-filter"></i> ${formatMonthYear(month)}`;
    badge.style.display = 'inline-flex';
    document.getElementById('clearFilterBtn').style.display = 'inline-flex';
  }
  
  function clearFilterBadge() {
    document.getElementById('filterBadge').style.display = 'none';
    document.getElementById('clearFilterBtn').style.display = 'none';
  }
  
  function toast(msg, type = 'info') {
    const wrap = document.getElementById('toastWrap');
    const div = document.createElement('div');
    div.className = 'toast';
    div.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
    wrap.appendChild(div);
    setTimeout(() => div.remove(), 3000);
  }
  
  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
  
  initUI();
  loadAccount();
  loadTransactions();
  loadAllAccounts();
</script>
</body>
</html>
